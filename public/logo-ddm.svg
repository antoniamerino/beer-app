<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- top arc: left → right pasando por arriba (CCW) -->
    <path id="arcTop" d="M 32,100 A 68,68 0 0,1 168,100"/>
    <!-- bottom arc: left → right pasando por abajo (CW) -->
    <path id="arcBottom" d="M 32,100 A 68,68 0 0,0 168,100"/>
  </defs>

  <!-- fondo oscuro (para ícono de app) -->
  <rect width="200" height="200" fill="#221508"/>

  <!-- borde del círculo, fino y claro -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#f0d8a8" stroke-width="1.2"/>

  <!-- CATA arriba -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#f0d8a8" letter-spacing="6" font-weight="400">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">CATA</textPath>
  </text>

  <!-- CERVEZAS abajo -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#f0d8a8" letter-spacing="4" font-weight="400">
    <textPath href="#arcBottom" startOffset="50%" text-anchor="middle">CERVEZAS</textPath>
  </text>

  <!-- DDM centro en itálica -->
  <text
    x="100" y="100"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="50"
    font-weight="700"
    font-style="italic"
    fill="#f0d8a8"
    letter-spacing="1"
  >DDM</text>
</svg>
